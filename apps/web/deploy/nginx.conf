# Reference Nginx vhost for app.feyton.co.rw → finxai-web (PM2, port 3011).
# Lives here for reproducibility; the live copy is /etc/nginx/sites-available/finxai-web
# (TLS lines are added/managed by Certbot on first `certbot --nginx -d app.feyton.co.rw`).
#
# CRITICAL: the large proxy_buffer_size is REQUIRED. Supabase sets the auth
# session as chunked Set-Cookie headers (JWT + refresh token + Google profile
# metadata) that overflow Nginx's default 4-8k header buffer — the symptom is a
# 502 "upstream sent too big header" on /auth/callback after a *successful*
# sign-in, with cookies never reaching the browser.

server {
    server_name app.feyton.co.rw;

    location / {
        proxy_pass         http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # Required for Supabase auth cookies (see note above).
        proxy_buffer_size       32k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;
    }

    listen 443 ssl;                 # managed by Certbot
    # ssl_certificate     /etc/letsencrypt/live/app.feyton.co.rw/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/app.feyton.co.rw/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name app.feyton.co.rw;
    # Certbot adds: if ($host = app.feyton.co.rw) { return 301 https://$host$request_uri; }
    return 301 https://$host$request_uri;
}
