name: Release APK (fallback)

# Primary releases are built locally and published via `npm run release`
# (faster, and produces a ~40MB arm64 APK instead of the ~130MB universal one).
# This workflow is a manual fallback only — run it from the Actions tab when you
# can't build locally. It no longer triggers on tag pushes.
on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'ABI to build (arm64-v8a keeps the APK small)'
        default: 'arm64-v8a'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Decode keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/finxai_release.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build release APK (${{ inputs.arch }})
        run: cd android && ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=${{ inputs.arch }}
        env:
          ORG_GRADLE_PROJECT_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ORG_GRADLE_PROJECT_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: finxai-apk
          path: android/app/build/outputs/apk/release/app-release.apk
